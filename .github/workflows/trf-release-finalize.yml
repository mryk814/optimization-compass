name: Finalize merged TRF release

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  finalize:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'fix/trf-release-finalize'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: '3.12'
          enable-cache: true
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install dependencies
        run: |
          uv sync --frozen --all-extras --all-groups
          npm ci --prefix site
      - name: Finalize release wiring and golden expectations
        run: |
          uv run python scripts/finalize_trf_release.py
          uv run ruff format \
            scripts/finalize_trf_release.py \
            src/optimization_compass/dataset_release.py \
            tests/test_method_content_density.py \
            tests/test_derived_media.py \
            tests/test_evidence.py \
            tests/test_release_identity.py \
            tests/test_site_export.py
      - name: Build and publish deterministic dataset 0.11.0
        run: |
          rm -rf .release-stage
          uv run python scripts/rebuild_dataset.py --stage --output .release-stage
          uv run python scripts/rebuild_dataset.py --publish --staged-directory .release-stage
          rm -rf .release-stage
          uv run python scripts/method_content_density_report.py
      - name: Validate Python and release artifacts
        run: |
          uv run ruff check .
          uv run ruff format --check .
          uv run mypy src
          uv run pytest \
            tests/test_trust_region_reflective.py \
            tests/test_site_recommendation.py \
            tests/test_dataset_release.py \
            tests/test_site_export.py
          uv run optimization-compass verify-data
          uv run python scripts/verify_content.py
          uv run python scripts/verify_licensing.py
      - name: Check recommendation parity
        id: parity
        continue-on-error: true
        run: npm --prefix site run parity > trf-parity.txt 2>&1
      - name: Type-check site
        id: typecheck
        continue-on-error: true
        run: npm --prefix site run typecheck > trf-typecheck.txt 2>&1
      - name: Test site
        id: site_tests
        continue-on-error: true
        run: npm --prefix site test -- --run > trf-site-tests.txt 2>&1
      - name: Build site
        id: site_build
        continue-on-error: true
        run: npm --prefix site run build > trf-site-build.txt 2>&1
      - name: Upload frontend diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trf-frontend-output
          path: |
            trf-parity.txt
            trf-typecheck.txt
            trf-site-tests.txt
            trf-site-build.txt
          if-no-files-found: error
          retention-days: 1
      - name: Require successful frontend validation
        if: >-
          steps.parity.outcome != 'success' ||
          steps.typecheck.outcome != 'success' ||
          steps.site_tests.outcome != 'success' ||
          steps.site_build.outcome != 'success'
        run: exit 1
      - name: Commit finalized release and remove temporary files
        run: |
          rm -f docs/trf-final-diagnostics.txt docs/trf-pytest-diagnostics.txt docs/trf-pytest-final.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm -f .github/workflows/trf-default-release-autogen.yml
          git rm -f .github/workflows/trf-fixture-version.yml
          git rm -f .github/workflows/trf-release-finalize.yml
          git rm -f scripts/finalize_trf_release.py
          git add -A data content docs site/public/data src tests .github/workflows scripts
          git commit -m 'fix: finalize Trust Region Reflective dataset 0.11.0'
          git push origin HEAD:${{ github.head_ref }}
