name: Diagnose Trust Region Reflective release

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  diagnose:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'data/trust-region-reflective-default'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: '3.12'
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen --all-extras --all-groups
      - name: Apply release wiring and capture build output
        run: |
          set +e
          python - <<'PY'
          from pathlib import Path
          import json

          path = Path('src/optimization_compass/dataset_release.py')
          text = path.read_text(encoding='utf-8')
          learning = 'DEFAULT_LEARNING_GRAPH_MIGRATION = ROOT / "data/migrations/010_learning_graph_and_aliases.sql"'
          trf = 'DEFAULT_TRF_DEFAULTS_MIGRATION = ROOT / "data/migrations/011_trust_region_reflective_defaults.sql"'
          if trf not in text:
              text = text.replace(learning, learning + '\n' + trf, 1)
          if '            DEFAULT_TRF_DEFAULTS_MIGRATION,\n' not in text:
              text = text.replace(
                  '            DEFAULT_FAILURE_MODE_MIGRATION,\n',
                  '            DEFAULT_FAILURE_MODE_MIGRATION,\n            DEFAULT_LEARNING_GRAPH_MIGRATION,\n            DEFAULT_TRF_DEFAULTS_MIGRATION,\n',
                  1,
              )
          if 'connection.executescript(DEFAULT_TRF_DEFAULTS_MIGRATION' not in text:
              anchor = '        connection.executescript(DEFAULT_LEARNING_GRAPH_MIGRATION.read_text(encoding="utf-8"))\n'
              text = text.replace(anchor, anchor + '        connection.executescript(DEFAULT_TRF_DEFAULTS_MIGRATION.read_text(encoding="utf-8"))\n', 1)
          path.write_text(text, encoding='utf-8')

          authority = Path('src/optimization_compass/resources/release-authority.json')
          payload = json.loads(authority.read_text(encoding='utf-8'))
          payload['dataset_version'] = '0.11.0'
          payload['release_date'] = '2026-07-16'
          authority.write_text(json.dumps(payload, indent=2) + '\n', encoding='utf-8')
          PY
          rm -rf .release-stage
          uv run python scripts/rebuild_dataset.py --stage --output .release-stage > docs/trf-build-diagnostics.txt 2>&1
          STATUS=$?
          set -e
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/trf-build-diagnostics.txt
          git rm .github/workflows/trf-build-diagnostics.yml
          git commit -m 'chore: capture TRF release build diagnostics'
          git push origin HEAD:${{ github.head_ref }}
          exit "$STATUS"
