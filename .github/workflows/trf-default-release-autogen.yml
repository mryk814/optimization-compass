name: Stage Trust Region Reflective release

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  release:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'data/trust-region-reflective-default'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: '3.12'
          enable-cache: true
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Wire migration and release authority
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import re

          dataset = Path('src/optimization_compass/dataset_release.py')
          text = dataset.read_text(encoding='utf-8')

          learning_constant = 'DEFAULT_LEARNING_GRAPH_MIGRATION = ROOT / "data/migrations/010_learning_graph_and_aliases.sql"'
          trf_constant = 'DEFAULT_TRF_DEFAULTS_MIGRATION = ROOT / "data/migrations/011_trust_region_reflective_defaults.sql"'
          if trf_constant not in text:
              if learning_constant not in text:
                  raise SystemExit('learning graph migration constant not found')
              text = text.replace(learning_constant, learning_constant + '\n' + trf_constant, 1)

          protected_anchor = '            DEFAULT_FAILURE_MODE_MIGRATION,\n'
          protected_insert = (
              '            DEFAULT_FAILURE_MODE_MIGRATION,\n'
              '            DEFAULT_LEARNING_GRAPH_MIGRATION,\n'
              '            DEFAULT_TRF_DEFAULTS_MIGRATION,\n'
          )
          if '            DEFAULT_TRF_DEFAULTS_MIGRATION,\n' not in text:
              if protected_anchor not in text:
                  raise SystemExit('protected-input anchor not found')
              text = text.replace(protected_anchor, protected_insert, 1)

          apply_anchor = '        connection.executescript(DEFAULT_LEARNING_GRAPH_MIGRATION.read_text(encoding="utf-8"))\n'
          apply_insert = apply_anchor + '        connection.executescript(DEFAULT_TRF_DEFAULTS_MIGRATION.read_text(encoding="utf-8"))\n'
          if 'connection.executescript(DEFAULT_TRF_DEFAULTS_MIGRATION' not in text:
              if apply_anchor not in text:
                  raise SystemExit('migration application anchor not found')
              text = text.replace(apply_anchor, apply_insert, 1)

          text = text.replace(
              '"Published constrained-continuous and multi-objective learning slices."',
              '"Published canonical Trust Region Reflective defaults and guidance."',
              1,
          )
          old_revision = re.compile(
              r'            "Constrained and multi-objective concepts lacked canonical executable visuals\.".*?'
              r'            target_version,\n            release_date,',
              re.DOTALL,
          )
          replacement = '''            "A widely used SciPy default was represented only through broad adjacent methods.",
            (
                "Added a canonical Trust Region Reflective method, primary source, "
                "implementation mapping, and API-default metadata."
            ),
            (
                "Separate library default behavior from method recommendation priority, "
                "and connect the dedicated beginner guide to generated search and retrieval."
            ),
            target_version,
            release_date,'''
          text, count = old_revision.subn(replacement, text, count=1)
          if count != 1 and 'A widely used SciPy default was represented' not in text:
              raise SystemExit('model revision block not found')
          dataset.write_text(text, encoding='utf-8')

          claims = Path('src/optimization_compass/versioned_claims.py')
          text = claims.read_text(encoding='utf-8')
          if 'I_SCIPY_LEAST_SQUARES_TRF' not in text.split('HIGH_USAGE_IMPLEMENTATION_IDS', 1)[1].split('\n\n', 1)[0]:
              text = text.replace(
                  'HIGH_USAGE_IMPLEMENTATION_IDS = frozenset({"I_ORTOOLS_CPSAT", "I_OPTUNA", "I_CVXPY"})',
                  'HIGH_USAGE_IMPLEMENTATION_IDS = frozenset({"I_ORTOOLS_CPSAT", "I_OPTUNA", "I_CVXPY", "I_SCIPY_LEAST_SQUARES_TRF"})',
                  1,
              )
          claims.write_text(text, encoding='utf-8')

          authority = Path('src/optimization_compass/resources/release-authority.json')
          payload = json.loads(authority.read_text(encoding='utf-8'))
          payload['dataset_version'] = '0.11.0'
          payload['release_date'] = '2026-07-16'
          authority.write_text(json.dumps(payload, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          least_squares = Path('content/methods/least-squares.md')
          text = least_squares.read_text(encoding='utf-8')
          if 'trust-region-reflective]' not in text.split('\n', 20)[0:20]:
              text = text.replace(
                  'related_ids: [method.gradient-descent, trust-region-newton-cg]',
                  'related_ids: [method.gradient-descent, trust-region-newton-cg, trust-region-reflective]',
                  1,
              )
          text = text.replace(
              '- bounds中心・大規模 → trust-region reflective',
              '- bounds中心・大規模 → [Trust Region Reflective](#/learn/trust-region-reflective)',
              1,
          )
          least_squares.write_text(text, encoding='utf-8')

          density_test = Path('tests/test_method_content_density.py')
          text = density_test.read_text(encoding='utf-8').replace(
              'MINIMUM_PUBLISHED_METHOD_GUIDES = 66',
              'MINIMUM_PUBLISHED_METHOD_GUIDES = 67',
              1,
          )
          density_test.write_text(text, encoding='utf-8')

          density_doc = Path('docs/method-content-density.md')
          text = density_doc.read_text(encoding='utf-8')
          addition = (
              '## Default-method pilot\n\n'
              'Issue #111 adds a dedicated Trust Region Reflective guide because it is selected implicitly by '
              'a high-use SciPy API. This raises the current published method-guide baseline to 67 while keeping '
              'library defaults separate from recommendation priority.\n\n'
          )
          if '## Default-method pilot' not in text:
              text = text.replace('## Audit report\n', addition + '## Audit report\n', 1)
          density_doc.write_text(text, encoding='utf-8')
          PY
          uv run ruff format src/optimization_compass/dataset_release.py src/optimization_compass/versioned_claims.py tests/test_trust_region_reflective.py tests/test_method_content_density.py
      - name: Install dependencies
        run: |
          uv sync --frozen --all-extras --all-groups
          npm ci --prefix site
      - name: Build deterministic dataset 0.11.0
        run: |
          rm -rf .release-stage
          uv run python scripts/rebuild_dataset.py --stage --output .release-stage
          uv run python scripts/rebuild_dataset.py --publish --staged-directory .release-stage
          rm -rf .release-stage
      - name: Regenerate content audit
        run: |
          uv run python scripts/verify_content.py
          uv run python scripts/method_content_density_report.py
      - name: Validate Python and release artifacts
        run: |
          uv run ruff check .
          uv run ruff format --check .
          uv run mypy src tests
          uv run pytest
          uv run python scripts/verify_release_bundle.py
      - name: Validate the site
        run: |
          npm --prefix site run typecheck
          npm --prefix site test -- --run
          npm --prefix site run build
      - name: Commit generated release and remove temporary workflow
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data content docs site/public/data src tests
          git rm .github/workflows/trf-default-release-autogen.yml
          git commit -m 'data: publish Trust Region Reflective dataset 0.11.0'
          git push origin HEAD:${{ github.head_ref }}
