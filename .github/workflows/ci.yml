name: Validated CI and Pages

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "30 17 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate_pages_artifact:
    name: Validate and build Pages artifact
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.identity.outputs.commit_sha }}
      dataset_version: ${{ steps.identity.outputs.dataset_version }}
      validation_task: ${{ steps.validation.outputs.task }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"
          enable-cache: true
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Verify dependency declarations and workflow pins
        run: |
          uv lock --check
          uv run --frozen python scripts/verify_workflow_pins.py
          npm --prefix site install --package-lock-only --ignore-scripts
          git diff --exit-code -- site/package-lock.json
      - name: Install Python dependencies
        run: uv sync --frozen --all-extras --all-groups
      - name: Install site dependencies
        run: npm ci
        working-directory: site
      - name: Select the authoritative validation task
        id: validation
        env:
          BASE_REF: ${{ github.base_ref }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            TASK="$(uv run optimization-compass select-validation-task --base-ref "origin/$BASE_REF" --format task)"
          else
            TASK="tier-b"
          fi
          echo "task=$TASK" >> "$GITHUB_OUTPUT"
          echo "Selected validation task: $TASK"
      - name: Audit Python and npm dependencies
        run: |
          uv run --frozen pip-audit --skip-editable
          npm --prefix site audit --audit-level=high
      - name: Generate dependency license inventory
        run: >-
          uv run --frozen python scripts/dependency_report.py
          --node-lock site/package-lock.json
          --output dependency-reports/dependency-licenses.json
      - name: Upload dependency license inventory
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dependency-license-inventory
          path: dependency-reports/dependency-licenses.json
          if-no-files-found: error
          retention-days: 30
      - name: Regenerate site data from the validated database
        if: steps.validation.outputs.task == 'tier-b' || steps.validation.outputs.task == 'content-ready'
        run: |
          rm -rf site/public/data
          uv run optimization-compass export-site-data --output site/public/data
          git diff --exit-code -- site/public/data
      - name: Run the selected authoritative validation task
        run: uv run optimization-compass validate "${{ steps.validation.outputs.task }}"
      - name: Build browser artifact for Tier A
        if: steps.validation.outputs.task == 'tier-a'
        run: npm --prefix site run build
      - name: Verify repository release facts
        run: |
          uv run python scripts/sync_readme_facts.py --check
          uv run python scripts/repository_size.py --check
      - name: Verify source health and generated drift
        if: steps.validation.outputs.task == 'tier-b'
        run: |
          uv run python scripts/source_health.py --output "$RUNNER_TEMP/source-health"
          git diff --exit-code -- data site/public/data src/optimization_compass/resources
      - name: Upload validated browser artifact
        if: github.event_name != 'push' && steps.validation.outputs.task != 'docs'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: validated-site-${{ github.sha }}
          path: site/dist
          if-no-files-found: error
          retention-days: 7
      - name: Stamp deployment identity
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: identity
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          uv run python scripts/pages_artifact.py stamp \
            --root site/dist \
            --commit-sha "$COMMIT_SHA" \
            --base-path /optimization-compass/
          DATASET_VERSION="$(uv run python -c 'import json; print(json.load(open("site/dist/deployment.json", encoding="utf-8"))["dataset_version"])')"
          echo "commit_sha=$COMMIT_SHA" >> "$GITHUB_OUTPUT"
          echo "dataset_version=$DATASET_VERSION" >> "$GITHUB_OUTPUT"
      - name: Verify the exact Pages directory to upload
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          COMMIT_SHA: ${{ steps.identity.outputs.commit_sha }}
          DATASET_VERSION: ${{ steps.identity.outputs.dataset_version }}
        run: |
          uv run python scripts/pages_artifact.py verify-local \
            --root site/dist \
            --expected-commit-sha "$COMMIT_SHA" \
            --expected-dataset-version "$DATASET_VERSION"
      - name: Upload the single validated Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          name: github-pages
          path: site/dist
          retention-days: 7

  browser_e2e:
    name: Browser E2E and accessibility
    if: (github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) && needs.validate_pages_artifact.outputs.validation_task != 'docs'
    needs: validate_pages_artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install site and browser dependencies
        run: |
          npm ci
          npx playwright install --with-deps chromium
        working-directory: site
      - name: Download the validated pull-request artifact
        if: github.event_name == 'pull_request'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: validated-site-${{ github.sha }}
          path: site/dist
      - name: Download the validated Pages artifact from this run
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: github-pages
          path: .pages-artifact
      - name: Extract the exact artifact under test
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          rm -rf site/dist
          mkdir -p site/dist
          tar -xf .pages-artifact/artifact.tar -C site/dist
          test -f site/dist/deployment.json
      - name: Run pull-request critical journeys
        if: github.event_name == 'pull_request'
        run: npm run test:e2e:critical
        working-directory: site
      - name: Run main critical journeys and axe scans
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          npm run test:e2e:critical
          npm run test:e2e:artifact -- e2e/accessibility.spec.ts --project=chromium-desktop
        working-directory: site
      - name: Upload browser failure evidence
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-failure-${{ github.sha }}
          path: |
            site/test-results
            site/playwright-report
          if-no-files-found: warn
          retention-days: 14

  full_browser_regression:
    name: Nightly full browser regression
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: validate_pages_artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install site and browser dependencies
        run: |
          npm ci
          npx playwright install --with-deps chromium
        working-directory: site
      - name: Download the validated nightly artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: validated-site-${{ github.sha }}
          path: site/dist
      - name: Run full desktop and mobile Playwright suite
        run: npm run test:e2e:artifact
        working-directory: site
      - name: Upload nightly browser failure evidence
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-nightly-failure-${{ github.sha }}
          path: |
            site/test-results
            site/playwright-report
          if-no-files-found: warn
          retention-days: 14

  deploy:
    name: Deploy validated artifact and smoke it
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [validate_pages_artifact, browser_e2e]
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: github-pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy the artifact uploaded by this workflow run
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
      - name: Check out the exact deployed commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.validate_pages_artifact.outputs.commit_sha }}
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Smoke deployed routes, JSON assets, licenses, and identity
        run: |
          python scripts/pages_artifact.py smoke-remote \
            --base-url "${{ steps.deployment.outputs.page_url }}" \
            --expected-commit-sha "${{ needs.validate_pages_artifact.outputs.commit_sha }}" \
            --expected-dataset-version "${{ needs.validate_pages_artifact.outputs.dataset_version }}" \
            --attempts 10 \
            --delay-seconds 6 \
            --timeout-seconds 20
