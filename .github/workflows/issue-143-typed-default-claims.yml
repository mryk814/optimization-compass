name: Publish validated dataset 0.16.0

on:
  pull_request:
    types: [reopened, synchronize]

permissions:
  actions: read
  contents: write

concurrency:
  group: issue-143-publish-dataset-0.16.0
  cancel-in-progress: false

jobs:
  publish:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'codex/issue-143-typed-default-method-claims'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      MERGE_SHA: 1dffa94ba442c8c9f02a506d6aca9ddf3e96642b
      SOURCE_SHA: f5405c7c525476a65d3703beba1a5f28a331cabe
      RELEASE_TAG: v0.16.0
      BUNDLE_NAME: optimization_method_selection_database_v0.16.0_bundle.zip
      MANIFEST_NAME: optimization_method_selection_database_v0.16.0_manifest.json
      BUNDLE_SHA256: 17775e4e8548b308459ad545dbdcf6ffce09703191e8be9848149430615c9dc9
      MANIFEST_SHA256: 059b77102487400dab0f19e372a0d4f0842dec382f21c941fd7e602096ec7a7a
      DATABASE_SHA256: 033aeeed35affc2873d7e1dc0dbd5e221197dc5fea2c057df2058c7e2ac72145
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0
      - name: Verify merged history and annotated release tag
        run: |
          set -euo pipefail
          git fetch origin main --tags --force
          git merge-base --is-ancestor "$MERGE_SHA" origin/main
          git merge-base --is-ancestor "$SOURCE_SHA" origin/main
          test "$(git rev-parse "${RELEASE_TAG}^{commit}")" = "$SOURCE_SHA"
      - name: Wait for successful main validation and Pages deployment
        run: |
          set -euo pipefail
          success=false
          for attempt in $(seq 1 90); do
            run_line="$(
              gh api "repos/${GITHUB_REPOSITORY}/actions/runs?head_sha=${MERGE_SHA}&event=push&per_page=20" \
                --jq '.workflow_runs[] | select(.name == "Validated CI and Pages") | [.id, .status, (.conclusion // "")] | @tsv' \
                | head -n 1
            )"
            if [[ -n "$run_line" ]]; then
              IFS=$'\t' read -r run_id status conclusion <<<"$run_line"
              echo "main workflow run=${run_id} status=${status} conclusion=${conclusion}"
              if [[ "$status" == "completed" && "$conclusion" == "success" ]]; then
                success=true
                break
              fi
              if [[ "$status" == "completed" && "$conclusion" != "success" ]]; then
                echo "main workflow did not succeed" >&2
                exit 1
              fi
            fi
            sleep 10
          done
          test "$success" = true

          deployed=false
          for attempt in $(seq 1 60); do
            payload="$(curl -fsSL "https://mryk814.github.io/optimization-compass/data/release.json?merge=${MERGE_SHA}" || true)"
            version="$(jq -r '.dataset_version // empty' <<<"$payload" 2>/dev/null || true)"
            database_sha="$(jq -r '.database_sha256 // empty' <<<"$payload" 2>/dev/null || true)"
            echo "Pages dataset_version=${version:-missing} database_sha256=${database_sha:-missing}"
            if [[ "$version" == "0.16.0" && "$database_sha" == "$DATABASE_SHA256" ]]; then
              deployed=true
              break
            fi
            sleep 10
          done
          test "$deployed" = true
      - name: Re-download and verify draft release assets
        run: |
          set -euo pipefail
          release_json="$(gh release view "$RELEASE_TAG" --json tagName,isDraft,isPrerelease,url,targetCommitish)"
          jq -e '.tagName == "v0.16.0" and .isDraft == true and .isPrerelease == false' <<<"$release_json"

          rm -rf release-download
          mkdir release-download
          gh release download "$RELEASE_TAG" \
            --pattern "$BUNDLE_NAME" \
            --pattern "$MANIFEST_NAME" \
            --dir release-download \
            --clobber
          echo "$BUNDLE_SHA256  release-download/$BUNDLE_NAME" | sha256sum --check --strict
          echo "$MANIFEST_SHA256  release-download/$MANIFEST_NAME" | sha256sum --check --strict
          jq -e --arg sha "$DATABASE_SHA256" '.database.sha256 == $sha' \
            "release-download/$MANIFEST_NAME"
      - name: Publish GitHub Release
        run: |
          set -euo pipefail
          gh release edit "$RELEASE_TAG" --draft=false --latest
          published="$(gh release view "$RELEASE_TAG" --json tagName,isDraft,isPrerelease,publishedAt,url)"
          jq -e '.tagName == "v0.16.0" and .isDraft == false and .isPrerelease == false and .publishedAt != null' <<<"$published"
          echo "$published" | jq .
