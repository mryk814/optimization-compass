name: Diagnose canonical TRF release

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  diagnose:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'data/trf-default-method'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: '3.12'
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen --all-extras --all-groups
      - name: Patch the release pipeline and capture the stage failure
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/optimization_compass/dataset_release.py')
          text = path.read_text(encoding='utf-8')
          replacements = (
              (
                  'DEFAULT_LEARNING_GRAPH_MIGRATION = ROOT / "data/migrations/010_learning_graph_and_aliases.sql"\n',
                  'DEFAULT_LEARNING_GRAPH_MIGRATION = ROOT / "data/migrations/010_learning_graph_and_aliases.sql"\n'
                  'DEFAULT_DEFAULT_METHOD_MIGRATION = ROOT / "data/migrations/011_default_method_trf.sql"\n',
              ),
              (
                  '            DEFAULT_FAILURE_MODE_MIGRATION,\n            seed_path,\n',
                  '            DEFAULT_FAILURE_MODE_MIGRATION,\n'
                  '            DEFAULT_LEARNING_GRAPH_MIGRATION,\n'
                  '            DEFAULT_DEFAULT_METHOD_MIGRATION,\n'
                  '            seed_path,\n',
              ),
              (
                  '        connection.executescript(DEFAULT_LEARNING_GRAPH_MIGRATION.read_text(encoding="utf-8"))\n'
                  '        _insert_problem_seed(connection, problem_seed)\n',
                  '        connection.executescript(DEFAULT_LEARNING_GRAPH_MIGRATION.read_text(encoding="utf-8"))\n'
                  '        connection.executescript(DEFAULT_DEFAULT_METHOD_MIGRATION.read_text(encoding="utf-8"))\n'
                  '        _insert_problem_seed(connection, problem_seed)\n',
              ),
              ('    expected = implementation_count * 7\n', '    expected = implementation_count * 7 + 2\n'),
          )
          for old, new in replacements:
              if text.count(old) != 1:
                  raise SystemExit(f'expected dataset_release fragment exactly once: {old[:100]!r}')
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY
          uv run ruff format src/optimization_compass/dataset_release.py

          set +e
          rm -rf /tmp/trf-release
          uv run python scripts/rebuild_dataset.py --stage --output /tmp/trf-release > docs/trf-release-diagnostics.txt 2>&1
          STATUS=$?
          set -e

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/optimization_compass/dataset_release.py docs/trf-release-diagnostics.txt
          git rm .github/workflows/trf-release-autogen.yml
          git commit -m 'chore: capture TRF release-stage diagnostics'
          git push origin HEAD:${{ github.head_ref }}
          exit "$STATUS"
