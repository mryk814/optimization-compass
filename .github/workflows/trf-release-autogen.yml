name: Regenerate Trust Region Reflective release

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  regenerate:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'data/trust-region-reflective'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: '3.12'
          enable-cache: true
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install deterministic media encoder
        run: |
          sudo apt-get update
          sudo apt-get install --yes ffmpeg
      - name: Install project dependencies
        run: |
          uv sync --frozen --all-extras --all-groups
          npm ci --prefix site
      - name: Wire the v0.11 migration and release notes
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/optimization_compass/dataset_release.py')
          text = path.read_text(encoding='utf-8')

          replacements = (
              (
                  'DEFAULT_LEARNING_GRAPH_MIGRATION = ROOT / "data/migrations/010_learning_graph_and_aliases.sql"\n',
                  'DEFAULT_LEARNING_GRAPH_MIGRATION = ROOT / "data/migrations/010_learning_graph_and_aliases.sql"\n'
                  'DEFAULT_TRF_MIGRATION = ROOT / "data/migrations/011_trust_region_reflective.sql"\n',
              ),
              (
                  '            DEFAULT_FAILURE_MODE_MIGRATION,\n            seed_path,\n',
                  '            DEFAULT_FAILURE_MODE_MIGRATION,\n'
                  '            DEFAULT_LEARNING_GRAPH_MIGRATION,\n'
                  '            DEFAULT_TRF_MIGRATION,\n'
                  '            seed_path,\n',
              ),
              (
                  '        connection.executescript(DEFAULT_LEARNING_GRAPH_MIGRATION.read_text(encoding="utf-8"))\n'
                  '        _insert_problem_seed(connection, problem_seed)\n',
                  '        connection.executescript(DEFAULT_LEARNING_GRAPH_MIGRATION.read_text(encoding="utf-8"))\n'
                  '        connection.executescript(DEFAULT_TRF_MIGRATION.read_text(encoding="utf-8"))\n'
                  '        _insert_problem_seed(connection, problem_seed)\n',
              ),
              (
                  '            "Published constrained-continuous and multi-objective learning slices.",\n',
                  '            "Added canonical Trust Region Reflective guidance and SciPy default-method claims.",\n',
              ),
              (
                  '            "Constrained and multi-objective concepts lacked canonical executable visuals.",\n',
                  '            "A common implicit SciPy least-squares default lacked a canonical method identity.",\n',
              ),
              (
                  '                "Added renderer-family contracts for feasible regions and Pareto fronts, "\n'
                  '                "with canonical scenarios, references, and failure contrast."\n',
                  '                "Added M_TRUST_REGION_REFLECTIVE, its primary source, hierarchy, aliases, "\n'
                  '                "implementation mapping, and versioned default claims."\n',
              ),
              (
                  '                "Connect canonical problems to artifacts, routes, content, Gallery, "\n'
                  '                "Map, and sources."\n',
                  '                "Make an implicit default inspectable and distinct from Gauss-Newton, "\n'
                  '                "Levenberg-Marquardt, and generic trust-region methods."\n',
              ),
          )
          for old, new in replacements:
              count = text.count(old)
              print(f'replacement count={count}: {old.splitlines()[0]}')
              if count != 1:
                  raise SystemExit(f'dataset_release.py replacement did not match exactly once: {old!r}')
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')

          docs = Path('docs/method-content-density.md')
          docs_text = docs.read_text(encoding='utf-8')
          marker = '## Audit report\n'
          section = '''## Default-method pilot\n\nIssue #111 adds Trust Region Reflective as the 99th canonical method and the 67th published method guide. The guide is prioritized because SciPy selects TRF implicitly in common least-squares calls, not because a library default is a universal recommendation.\n\nThe pilot also establishes a versioned default-method audit in [`library-defaults.md`](library-defaults.md). It records the API, selection condition, override, fallback, version, and source separately from problem-level recommendation data.\n\n'''
          if section not in docs_text:
              if docs_text.count(marker) != 1:
                  raise SystemExit('method-content-density audit marker is missing or duplicated')
              docs_text = docs_text.replace(marker, section + marker, 1)
              old_floor = 'After the second beginner method tranche, all 66 published method guides must meet the Level 2 floor. This does not imply that all 98 registered methods have full guides;'
              new_floor = 'After the TRF pilot, all 67 published method guides must meet the Level 2 floor. This does not imply that all 99 registered methods have full guides;'
              if docs_text.count(old_floor) != 1:
                  raise SystemExit('method-content-density floor sentence did not match')
              docs_text = docs_text.replace(old_floor, new_floor, 1)
              docs.write_text(docs_text, encoding='utf-8')
          PY
          uv run ruff format src/optimization_compass/dataset_release.py
      - name: Stage and publish dataset v0.11.0
        run: |
          rm -rf .staged-trf-release
          uv run python - <<'PY'
          from pathlib import Path

          from optimization_compass.dataset_release import build_staged_release, publish_release

          root = Path.cwd()
          staged = build_staged_release(
              root / 'data/optimization_method_selection_database_v0.2.0.sqlite',
              root / '.staged-trf-release',
          )
          if staged.version != '0.11.0':
              raise SystemExit(f'unexpected staged version: {staged.version}')
          publish_release(
              staged.output_directory,
              root / 'data',
              root / 'src/optimization_compass/resources/knowledge.sqlite',
              root / 'src/optimization_compass/resources/DATASET_VERSION',
              root / 'site/public/data',
          )
          PY
          rm -rf .staged-trf-release
          uv run python scripts/method_content_density_report.py
      - name: Validate the canonical release
        run: |
          uv run ruff check .
          uv run ruff format --check .
          uv run mypy src
          uv run pytest
          uv run optimization-compass verify-data
          uv run python scripts/verify_content.py
          npm --prefix site run parity
          npm --prefix site run typecheck
          npm --prefix site test -- --run
          npm --prefix site run build
      - name: Commit generated release and remove temporary workflow
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data src/optimization_compass/resources site/public/data \
            content docs tests src/optimization_compass/dataset_release.py \
            src/optimization_compass/versioned_claims.py
          git rm .github/workflows/trf-release-autogen.yml
          git commit -m 'chore: publish dataset v0.11.0 with Trust Region Reflective'
          git push origin HEAD:${{ github.head_ref }}
