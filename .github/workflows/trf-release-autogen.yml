name: Regenerate Trust Region Reflective release

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  regenerate:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'data/trust-region-reflective'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: '3.12'
          enable-cache: true
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install dependencies and media encoder
        run: |
          sudo apt-get update
          sudo apt-get install --yes ffmpeg
          uv sync --frozen --all-extras --all-groups
          npm ci --prefix site
      - name: Stage and publish dataset v0.11.0
        run: |
          set +e
          rm -rf .staged-trf-release
          uv run python - <<'PY' > docs/trf-release-diagnostics.txt 2>&1
          from pathlib import Path
          from optimization_compass.dataset_release import build_staged_release, publish_release

          root = Path.cwd()
          staged = build_staged_release(
              root / 'data/optimization_method_selection_database_v0.2.0.sqlite',
              root / '.staged-trf-release',
          )
          if staged.version != '0.11.0':
              raise SystemExit(f'unexpected staged version: {staged.version}')
          publish_release(
              staged.output_directory,
              root / 'data',
              root / 'src/optimization_compass/resources/knowledge.sqlite',
              root / 'src/optimization_compass/resources/DATASET_VERSION',
              root / 'site/public/data',
          )
          PY
          STATUS=$?
          set -e
          rm -rf .staged-trf-release
          if [[ "$STATUS" != '0' ]]; then
            cat docs/trf-release-diagnostics.txt
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add docs/trf-release-diagnostics.txt
            git commit -m 'chore: capture TRF release diagnostics'
            git push origin HEAD:${{ github.head_ref }}
            exit "$STATUS"
          fi
          rm docs/trf-release-diagnostics.txt
          uv run python scripts/method_content_density_report.py
      - name: Validate the canonical release
        run: |
          uv run ruff check .
          uv run ruff format --check .
          uv run mypy src
          uv run pytest
          uv run optimization-compass verify-data
          uv run python scripts/verify_content.py
          npm --prefix site run parity
          npm --prefix site run typecheck
          npm --prefix site test -- --run
          npm --prefix site run build
      - name: Commit generated release and remove temporary workflow
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data src/optimization_compass/resources site/public/data \
            content docs tests src/optimization_compass/dataset_release.py \
            src/optimization_compass/versioned_claims.py
          git rm .github/workflows/trf-release-autogen.yml
          git commit -m 'chore: publish dataset v0.11.0 with Trust Region Reflective'
          git push origin HEAD:${{ github.head_ref }}
