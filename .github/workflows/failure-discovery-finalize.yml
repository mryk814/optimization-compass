name: Failure discovery finalizer

on:
  push:
    branches: [feat/failure-discovery-index]

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: feat/failure-discovery-index
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"
          enable-cache: true
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: uv sync --frozen --all-extras --all-groups
      - run: npm ci
        working-directory: site
      - name: Apply source integration
        run: uv run python scripts/apply_failure_discovery_slice.py
      - name: Regenerate canonical site data
        run: |
          rm -rf site/public/data
          uv run optimization-compass export-site-data --output site/public/data
      - name: Validate focused contracts
        run: |
          uv run pytest tests/test_failure_modes.py tests/test_failure_discovery.py
          npm --prefix site run typecheck
          npm --prefix site test -- --run src/contracts/failure-discovery.test.ts src/features/failures/FailureDiscoveryPage.test.tsx
      - name: Commit generated integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/optimization_compass/site_export.py site/src/App.tsx site/public/data
          git diff --cached --quiet && exit 0
          git commit -s -m "chore: generate unified failure discovery data [failure-discovery-finalized]"
          git push origin HEAD:feat/failure-discovery-index
