name: Regenerate normalized method guides

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  regenerate:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'content/normalize-existing-guides'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: '3.12'
          enable-cache: true
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install dependencies
        run: |
          uv sync --frozen --all-extras --all-groups
          npm ci --prefix site
      - name: Regenerate canonical site data
        run: |
          rm -rf site/public/data
          uv run optimization-compass export-site-data --output site/public/data
      - name: Lint and format-check Python
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: Validate content schema and canonical references
        run: uv run python scripts/verify_content.py
      - name: Validate the method-density contract
        run: uv run pytest tests/test_content_models.py tests/test_method_content_density.py
      - name: Validate the site
        run: |
          npm --prefix site run typecheck
          npm --prefix site test -- --run
          npm --prefix site run build
      - name: Commit generated artifacts and remove temporary workflow
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add content tests site/public/data
          git rm .github/workflows/content-existing-guides-autogen.yml
          git commit -m 'chore: regenerate indexes for normalized method guides'
          git push origin HEAD:${{ github.head_ref }}
