name: Compact expanded search index

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  compact:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'content/beginner-method-tranche-2'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: '3.12'
          enable-cache: true
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install dependencies
        run: |
          uv sync --frozen --all-extras --all-groups
          npm ci --prefix site
      - name: Compact only the machine search index
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/optimization_compass/site_export.py')
          text = path.read_text(encoding='utf-8')
          old_call = '    _write_json(output_dir / "search-index.json", search_index)\n'
          new_call = '    _write_json(output_dir / "search-index.json", search_index, compact=True)\n'
          old_function = '''def _write_json(path: Path, model: Any) -> None:
              path.parent.mkdir(parents=True, exist_ok=True)
              value = model if isinstance(model, dict) else model.model_dump(mode="json")
              payload = json.dumps(value, ensure_ascii=False, indent=2, sort_keys=True)
              path.write_text(payload + "\\n", encoding="utf-8", newline="\\n")
          '''
          new_function = '''def _write_json(path: Path, model: Any, *, compact: bool = False) -> None:
              path.parent.mkdir(parents=True, exist_ok=True)
              value = model if isinstance(model, dict) else model.model_dump(mode="json")
              if compact:
                  payload = json.dumps(value, ensure_ascii=False, separators=(",", ":"), sort_keys=True)
              else:
                  payload = json.dumps(value, ensure_ascii=False, indent=2, sort_keys=True)
              path.write_text(payload + "\\n", encoding="utf-8", newline="\\n")
          '''
          if old_call not in text:
              raise SystemExit('search-index writer call did not match the expected source')
          if old_function not in text:
              raise SystemExit('JSON writer function did not match the expected source')
          path.write_text(
              text.replace(old_call, new_call, 1).replace(old_function, new_function, 1),
              encoding='utf-8',
          )
          PY
          uv run ruff format src/optimization_compass/site_export.py
      - name: Regenerate canonical site data
        run: |
          rm -rf site/public/data
          uv run optimization-compass export-site-data --output site/public/data
          stat --format='search-index bytes: %s' site/public/data/search-index.json
      - name: Validate expanded content and search
        run: |
          uv run ruff check .
          uv run ruff format --check .
          uv run python scripts/verify_content.py
          uv run python scripts/method_content_density_report.py
          uv run pytest tests/test_search_index.py tests/test_content_models.py tests/test_method_content_density.py
      - name: Validate the site
        run: |
          npm --prefix site run typecheck
          npm --prefix site test -- --run
          npm --prefix site run build
      - name: Commit source and generated artifacts
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/optimization_compass/site_export.py docs site/public/data
          git rm .github/workflows/content-search-index-compaction.yml
          git commit -m 'chore: compact the expanded lexical search index'
          git push origin HEAD:${{ github.head_ref }}
