name: Align structured predicate copy

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  fix-and-validate:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'ux/collapse-page-guides'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Align the Map regression with the shared predicate label
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('site/src/features/map/MapPage.test.tsx')
          text = path.read_text(encoding='utf-8')
          old = 'expect(screen.getAllByRole("heading", { level: 2, name: "機械評価できる前提" })).toHaveLength(2);'
          new = 'expect(screen.getAllByRole("heading", { level: 2, name: "構造化された適用前提" })).toHaveLength(2);'
          if text.count(old) != 1:
              raise SystemExit('expected Map predicate assertion was not found exactly once')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
          rm -f docs/frontend-diagnostics-final.txt
      - name: Install dependencies
        run: npm ci --prefix site
      - name: Validate the complete frontend
        run: |
          npm --prefix site run typecheck
          npm --prefix site test -- --run
          npm --prefix site run build
      - name: Commit the aligned regression and remove temporary workflow
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add site/src/features/map/MapPage.test.tsx
          git rm --ignore-unmatch docs/frontend-diagnostics-final.txt
          git rm .github/workflows/ux-fix-map-predicate-copy.yml
          git commit -m 'test: align Map predicate copy with structured details'
          git push origin HEAD:${{ github.head_ref }}
