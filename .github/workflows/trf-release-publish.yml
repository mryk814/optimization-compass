name: Diagnose canonical TRF validation

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  diagnose:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'data/trf-default-method'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: '3.12'
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen --all-extras --all-groups
      - name: Rebuild the published tree and capture each validation
        run: |
          rm -rf /tmp/trf-release
          uv run python scripts/rebuild_dataset.py --stage --output /tmp/trf-release
          uv run python scripts/rebuild_dataset.py --publish --staged-directory /tmp/trf-release
          uv run python scripts/method_content_density_report.py

          set +e
          STATUS=0
          : > docs/trf-validation-diagnostics.txt

          run_check() {
            NAME="$1"
            shift
            {
              echo "## $NAME"
              echo '```text'
              "$@"
              RESULT=$?
              echo
              echo "exit_status=$RESULT"
              echo '```'
              echo
            } >> docs/trf-validation-diagnostics.txt 2>&1
            if [[ "$RESULT" != '0' ]]; then
              STATUS=1
            fi
          }

          run_check 'ruff-check' uv run ruff check .
          run_check 'ruff-format' uv run ruff format --check .
          run_check 'mypy' uv run mypy src
          run_check 'pytest' uv run pytest --maxfail=5 -q
          run_check 'verify-data' uv run optimization-compass verify-data
          run_check 'verify-content' uv run python scripts/verify_content.py
          run_check 'verify-licensing' uv run python scripts/verify_licensing.py
          set -e

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/trf-validation-diagnostics.txt
          git rm .github/workflows/trf-release-publish.yml
          git commit -m 'chore: capture TRF validation diagnostics'
          git push origin HEAD:${{ github.head_ref }}
          exit "$STATUS"
