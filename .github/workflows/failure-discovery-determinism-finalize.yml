name: Failure discovery determinism finalizer

on:
  push:
    branches: [feat/failure-discovery-index]

permissions:
  contents: write

concurrency:
  group: failure-discovery-determinism-finalizer
  cancel-in-progress: true

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: feat/failure-discovery-index
          fetch-depth: 0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"
          enable-cache: true
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: uv sync --frozen --all-extras --all-groups
      - run: npm ci
        working-directory: site
      - name: Align test inputs and reject nondeterministic generated timestamps
        run: |
          if test -f scripts/apply_failure_discovery_slice.py; then
            uv run python scripts/apply_failure_discovery_slice.py
          fi
          uv run python - <<'PY'
          from pathlib import Path

          tests = Path("tests/test_failure_discovery.py")
          text = tests.read_text(encoding="utf-8")
          needle = '        gallery_seed=root / "data/seeds/site_gallery.json",\n'
          replacement = (
              needle
              + '        failure_mode_path=root / "site/public/data/failure-modes.json",\n'
          )
          if "failure_mode_path=" not in text:
              if text.count(needle) != 3:
                  raise RuntimeError("failure discovery test call anchors changed")
              text = text.replace(needle, replacement)
          tests.write_text(text, encoding="utf-8", newline="\n")

          module = Path("src/optimization_compass/failure_discovery.py")
          source = module.read_text(encoding="utf-8")
          source = source.replace("from datetime import UTC, datetime\n", "")
          old = '''def _generated_at(payload: Mapping[str, Any]) -> str:
              value = payload.get("generated_at")
              if isinstance(value, str) and value:
                  return value
              return datetime.now(UTC).replace(microsecond=0).isoformat().replace("+00:00", "Z")
          '''
          new = '''def _generated_at(payload: Mapping[str, Any]) -> str:
              value = payload.get("generated_at")
              if not isinstance(value, str) or not value:
                  raise ValueError("failure mode export requires deterministic generated_at")
              return value
          '''
          if old in source:
              source = source.replace(old, new, 1)
          module.write_text(source, encoding="utf-8", newline="\n")
          PY
      - name: Regenerate twice and validate byte identity
        run: |
          uv run ruff check --fix src/optimization_compass/failure_discovery.py tests/test_failure_discovery.py
          uv run ruff format src/optimization_compass/failure_discovery.py tests/test_failure_discovery.py
          rm -rf site/public/data
          uv run optimization-compass export-site-data --output site/public/data
          cp site/public/data/failure-discovery.json /tmp/failure-discovery-first.json
          rm -rf site/public/data
          uv run optimization-compass export-site-data --output site/public/data
          cmp /tmp/failure-discovery-first.json site/public/data/failure-discovery.json
          uv run mypy src
          uv run pytest tests/test_failure_modes.py tests/test_failure_discovery.py
          npm --prefix site run typecheck
          npm --prefix site test -- --run src/contracts/failure-discovery.test.ts src/features/failures/FailureDiscoveryPage.test.tsx
          npm --prefix site run build
      - name: Remove all one-shot helpers and commit the clean branch
        run: |
          rm -f \
            scripts/apply_failure_discovery_slice.py \
            .github/workflows/failure-discovery-snapshot.yml \
            .github/workflows/failure-discovery-finalize.yml \
            .github/workflows/failure-discovery-clean-finalize.yml \
            .github/workflows/failure-discovery-path-repair.yml \
            .github/workflows/failure-discovery-determinism-finalize.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -s -m "feat: finalize deterministic failure discovery index"
          git pull --rebase origin feat/failure-discovery-index
          git push origin HEAD:feat/failure-discovery-index
