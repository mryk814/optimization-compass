name: Source and metadata health

on:
  schedule:
    - cron: "23 2 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  report:
    name: Report broken links and stale metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --all-extras
      - name: Check sources without changing authority data
        run: uv run python scripts/source_health.py --check-network --output source-health-report
      - name: Upload the immutable report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: source-health-${{ github.run_id }}
          path: source-health-report/
          if-no-files-found: error
          retention-days: 30
