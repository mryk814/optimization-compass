name: Source and metadata health

on:
  schedule:
    - cron: "23 2 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  report:
    name: Report broken links and stale metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --all-extras
      - name: Check sources without changing authority data
        run: uv run python scripts/source_health.py --check-network --output source-health-report
      - name: Upload the immutable report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: source-health-${{ github.run_id }}
          path: source-health-report/
          if-no-files-found: error
          retention-days: 30
