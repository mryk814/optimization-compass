name: Normalize final TRF regression

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  normalize:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'data/trf-default-method'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: '3.12'
          enable-cache: true
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install dependencies
        run: |
          uv sync --frozen --all-extras --all-groups
          npm ci --prefix site
      - name: Apply canonical formatting
        run: uv run ruff format tests/test_versioned_claims.py
      - name: Validate final TRF release
        run: |
          uv run ruff check .
          uv run ruff format --check .
          uv run mypy src
          uv run pytest
          uv run optimization-compass verify-data
          uv run python scripts/verify_content.py
          uv run python scripts/verify_licensing.py
          npm --prefix site run parity
          npm --prefix site run typecheck
          npm --prefix site test -- --run
          npm --prefix site run build
      - name: Commit normalized regression and remove workflow
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tests/test_versioned_claims.py
          git rm .github/workflows/trf-format-final.yml
          git commit -m 'style: normalize the canonical TRF regression'
          git push origin HEAD:${{ github.head_ref }}
