name: Normalize TRF recommendation fixture mappings

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  normalize:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'fix/trf-release-finalize'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Remove superseded adjacent-method mappings
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('tests/fixtures/recommendation_cases.json')
          text = path.read_text(encoding='utf-8')
          updated, removed = re.subn(
              r'^\s*"I_SCIPY_LEAST_SQUARES_TRF",\n',
              '',
              text,
              flags=re.MULTILINE,
          )
          if removed < 2:
              raise SystemExit(f'expected at least two superseded TRF mappings, removed {removed}')
          path.write_text(updated, encoding='utf-8')
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tests/fixtures/recommendation_cases.json
          git rm .github/workflows/trf-fixture-map-cleanup.yml
          git commit -m 'test: remove superseded TRF implementation expectations'
          git push origin HEAD:${{ github.head_ref }}
