name: Historical packager finalizer

on:
  push:
    branches: [feat/historical-release-packager]

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: feat/historical-release-packager
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --frozen --all-extras --all-groups
      - name: Format and validate the focused slice
        run: |
          uv run ruff check --fix scripts/package_historical_release.py tests/test_historical_release_packager.py
          uv run ruff format scripts/package_historical_release.py tests/test_historical_release_packager.py
          uv run pytest tests/test_historical_release_packager.py
      - name: Remove finalizer and commit formatting
        run: |
          rm -f .github/workflows/historical-packager-finalize.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -s -m "chore: finalize historical release packager"
          git push origin HEAD:feat/historical-release-packager
