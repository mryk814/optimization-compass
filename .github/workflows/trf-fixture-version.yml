name: Align TRF recommendation fixture

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  update:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'data/trust-region-reflective-default'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Update the shared fixture version
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('tests/fixtures/recommendation_cases.json')
          text = path.read_text(encoding='utf-8')
          old = '  "dataset_version": "0.10.0",'
          new = '  "dataset_version": "0.11.0",'
          if text.count(old) != 1:
              raise SystemExit('recommendation fixture dataset version did not match exactly once')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tests/fixtures/recommendation_cases.json
          git rm .github/workflows/trf-fixture-version.yml
          git commit -m 'test: align recommendation fixture with dataset 0.11.0'
          git push origin HEAD:${{ github.head_ref }}
