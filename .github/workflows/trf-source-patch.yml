name: Apply TRF release source patch

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  patch:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'data/trust-region-reflective'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: '3.12'
          enable-cache: true
      - name: Install source tooling
        run: uv sync --frozen --all-extras --all-groups
      - name: Patch and format release sources
        run: |
          python scripts/prepare_trf_release_source.py
          uv run ruff format src/optimization_compass/dataset_release.py \
            src/optimization_compass/versioned_claims.py tests/test_versioned_claims.py
      - name: Commit source changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/optimization_compass/dataset_release.py \
            src/optimization_compass/versioned_claims.py tests/test_versioned_claims.py \
            docs/method-content-density.md
          git rm scripts/prepare_trf_release_source.py .github/workflows/trf-source-patch.yml
          git commit -m 'data: wire TRF migrations and typed default claims'
          git push origin HEAD:${{ github.head_ref }}
