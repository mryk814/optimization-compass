name: Validate collapsed guide UX

on:
  push:
    branches: [ux/collapse-page-guides]

permissions:
  contents: write

jobs:
  validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ux/collapse-page-guides
          fetch-depth: 0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install site dependencies
        run: npm ci --prefix site
      - name: Validate focused components
        run: |
          npm --prefix site run typecheck
          npm --prefix site test -- --run src/components/PageOrientation.test.tsx src/features/methods/MethodPage.test.tsx src/features/methods/MethodPredicates.test.tsx
          npm --prefix site run build
      - name: Remove temporary workflow
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm .github/workflows/ux-collapse-guides-check.yml
          git commit -m 'chore: remove collapsed guide validation workflow'
          git push origin HEAD:ux/collapse-page-guides
