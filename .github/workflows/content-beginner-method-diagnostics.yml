name: Diagnose second beginner method tranche

on:
  push:
    branches: [content/beginner-method-tranche-2]

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: content/beginner-method-tranche-2
          fetch-depth: 0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: '3.12'
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen --all-extras --all-groups
      - name: Capture the first failing test
        run: |
          set +e
          uv run pytest --maxfail=1 -q > docs/pytest-diagnostics.txt 2>&1
          STATUS=$?
          set -e
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/pytest-diagnostics.txt
          git rm .github/workflows/content-beginner-method-diagnostics.yml
          git commit -m 'chore: capture content tranche pytest diagnostics'
          git push origin HEAD:content/beginner-method-tranche-2
          exit "$STATUS"
