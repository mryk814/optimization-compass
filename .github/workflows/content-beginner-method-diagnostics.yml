name: Diagnose second beginner method tranche

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  diagnose:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'content/beginner-method-tranche-2'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: '3.12'
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen --all-extras --all-groups
      - name: Capture failing test files in parallel
        run: |
          set +e
          rm -rf /tmp/pytest-files
          mkdir -p /tmp/pytest-files

          run_file() {
            FILE="$1"
            SAFE_NAME="${FILE//\//_}"
            timeout 600 uv run pytest -q "$FILE" > "/tmp/pytest-files/${SAFE_NAME}.log" 2>&1
            echo "$?" > "/tmp/pytest-files/${SAFE_NAME}.status"
          }
          export -f run_file

          find tests -name 'test_*.py' -print0 \
            | xargs -0 -n1 -P4 bash -c 'run_file "$1"' _

          STATUS=0
          {
            echo '# Full-suite test-file diagnostics'
            echo
            for STATUS_FILE in /tmp/pytest-files/*.status; do
              FILE_STATUS="$(cat "$STATUS_FILE")"
              LOG_FILE="${STATUS_FILE%.status}.log"
              if [[ "$FILE_STATUS" != '0' ]]; then
                STATUS=1
                echo "## $(basename "$LOG_FILE" .log)"
                echo
                echo '```text'
                cat "$LOG_FILE"
                echo '```'
                echo
              fi
            done
            if [[ "$STATUS" == '0' ]]; then
              echo 'All test files passed when executed independently.'
            fi
          } > docs/pytest-diagnostics.txt
          set -e

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/pytest-diagnostics.txt
          git rm .github/workflows/content-beginner-method-diagnostics.yml
          git commit -m 'chore: capture content tranche pytest diagnostics'
          git push origin HEAD:${{ github.head_ref }}
          exit "$STATUS"
