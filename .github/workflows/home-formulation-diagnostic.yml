name: Home formulation diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  typecheck_diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci
        working-directory: site
      - name: Capture typecheck output
        shell: bash
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee typecheck.log
        working-directory: site
      - name: Upload typecheck diagnostic
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: home-formulation-typecheck
          path: site/typecheck.log
          if-no-files-found: error
          retention-days: 1
