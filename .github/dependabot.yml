version: 2
updates:
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 5
    groups:
      python-dependencies:
        patterns: ["*"]
    commit-message:
      prefix: "chore(deps-python)"

  - package-ecosystem: npm
    directory: /site
    schedule:
      interval: weekly
      day: monday
      time: "09:15"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 5
    groups:
      site-dependencies:
        patterns: ["*"]
    commit-message:
      prefix: "chore(deps-site)"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns: ["*"]
    commit-message:
      prefix: "chore(deps-actions)"
